# Insert these `location` blocks inside the HTTPS `server { ... }` for
# lizard-class.cc.gatech.edu, *before* `location / { ... }`, so regex order
# matches `.mjs` / `.wasm` before the catch-all prefix.
#
# Symptom without this: browser console shows
#   "Failed to load module script ... MIME type of application/octet-stream"
# for ort-wasm-simd-threaded.*.mjs (ONNX Runtime Web uses ES modules).
#
# Why not only `default_type`?
# For static files nginx picks MIME from the inherited `types` map first. If
# `.mjs` is missing there, many builds still end up as `application/octet-stream`,
# and `default_type` inside `location` does not reliably override that.
# Setting `types { ... }` *in this location* defines the map used for these
# responses so `Content-Type` is correct for ES module imports.
#
# Do not add `add_header` here unless you repeat the parent server's security
# headers; otherwise nginx drops inherited `add_header` for these responses.

location ~* \.mjs$ {
    types {
        application/javascript mjs;
    }
}

location ~* \.wasm$ {
    types {
        application/wasm wasm;
    }
}
